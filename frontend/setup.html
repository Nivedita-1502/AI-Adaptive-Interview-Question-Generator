{% extends "base.html" %}

{% block content %}

<h2>Start AI Interview Preparation</h2>

<form id="startForm">

<label>Difficulty</label>

<select id="difficulty" required>
<option value="Easy">Easy</option>
<option value="Medium">Medium</option>
<option value="Hard">Hard</option>
</select>


<label>Subject</label>

<select id="subject" required>
<option value="">Loading subjects...</option>
</select>


<label>Number of Questions</label>

<input type="number" id="num_questions" min="1" max="20" value="3" required>


<button type="submit">
Next
</button>

</form>


<script>

async function loadSubjects() {

    const response = await fetch("/api/subjects/");
    const data = await response.json();

    const subjectDropdown = document.getElementById("subject");

    subjectDropdown.innerHTML = "";

    data.subjects.forEach(subject => {

        const option = document.createElement("option");
        option.value = subject;
        option.textContent = subject;

        subjectDropdown.appendChild(option);

    });
}


document.getElementById("startForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const subject = document.getElementById("subject").value;
    const difficulty = document.getElementById("difficulty").value;

    // 1. Clear any old session data to start fresh
    localStorage.removeItem("session_id");

    const response = await fetch(`/api/start/?subject=${subject}&difficulty=${difficulty}`);
    const data = await response.json();

    if(data.session_id){
        // 2. Explicitly store as a string
        localStorage.setItem("session_id", data.session_id);
        
        // 3. Small delay or console log to verify before redirecting
        console.log("New Session ID saved:", data.session_id);
        window.location.href = "/interview/";
    } else {
        alert("Failed to start session: " + (data.error || "Unknown error"));
    }
});


window.onload = loadSubjects;

</script>


{% endblock %}
