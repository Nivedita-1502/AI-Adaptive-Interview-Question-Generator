<!DOCTYPE html>
<html>
<head>

<title>AI Adaptive Interview</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:650px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:30px;
}

label{
font-weight:bold;
margin-top:15px;
display:block;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:2px solid #ccc;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

button{
margin-top:20px;
width:100%;
padding:14px;
background:#667eea;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5565d9;
}

.question-box{
background:#f3f4f7;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.result{
text-align:center;
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
